<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communication Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --gold: #f59e0b;
  }

  /* --- LIGHT MODE VARIABLES --- */
  body.light-mode {
    --bg: #f8fafc;
    --surface: #ffffff;
    --card: #f1f5f9;
    --border: #cbd5e1;
    --text: #0f172a;
    --muted: #475569;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, border-color 0.3s ease; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
  }
  .glow-1 { background: var(--accent); top: -200px; left: -200px; }
  .glow-2 { background: var(--accent2); bottom: -200px; right: -200px; }

  /* THEME TOGGLE BUTTON */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 45px; height: 45px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  /* SCREENS */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

  /* ====== SETUP SCREEN ====== */
  #setup-screen {
    justify-content: center;
    gap: 32px;
  }

  .logo {
    text-align: center;
    animation: fadeDown 0.6s ease;
  }
  .logo h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -2px;
    line-height: 1;
  }
  .logo p {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    margin-top: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .setup-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .setup-card h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 16px;
  }

  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .type-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 8px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
    text-align: center;
  }
  .type-btn:hover { border-color: var(--accent); }
  .type-btn.selected {
    background: rgba(124,58,237,0.2);
    border-color: var(--accent);
    color: #a78bfa;
  }
  body.light-mode .type-btn.selected { color: var(--accent); }
  .type-btn .type-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }

  .option-row {
    display: flex;
    gap: 8px;
  }
  .opt-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
    text-align: center;
  }
  .opt-btn:hover { border-color: var(--accent2); }
  .opt-btn.selected {
    background: rgba(6,182,212,0.15);
    border-color: var(--accent2);
    color: #67e8f9;
  }
  body.light-mode .opt-btn.selected { color: var(--accent2); }

  .start-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    padding: 18px 60px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 1px;
    transition: all 0.2s;
    animation: fadeUp 0.6s ease 0.4s both;
    position: relative;
    overflow: hidden;
  }
  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .start-btn:hover::before { opacity: 1; }
  .start-btn span { position: relative; z-index: 1; }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.4); }

  /* ====== QUIZ SCREEN ====== */
  #quiz-screen { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }

  .quiz-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    width: 100%;
  }

  .progress-bar-wrap {
    flex: 1;
    background: var(--border);
    border-radius: 50px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 50px;
    transition: width 0.4s ease;
  }

  .q-counter {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
    font-weight: bold;
  }

  .score-badge {
    display: flex;
    gap: 8px;
  }
  .badge {
    padding: 4px 10px;
    border-radius: 50px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .badge.correct { background: rgba(16,185,129,0.15); color: var(--correct); border: 1px solid rgba(16,185,129,0.3); }
  .badge.wrong { background: rgba(239,68,68,0.15); color: var(--wrong); border: 1px solid rgba(239,68,68,0.3); }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 20px;
    animation: slideIn 0.35s ease;
  }

  .q-type-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    font-weight: 700;
  }
  .tag-mcq { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .tag-fill { background: rgba(6,182,212,0.15); color: #67e8f9; border: 1px solid rgba(6,182,212,0.3); }
  .tag-tf { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  
  body.light-mode .tag-mcq { color: var(--accent); }
  body.light-mode .tag-fill { color: var(--accent2); }

  .q-text {
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 28px;
    color: var(--text);
  }

  /* MCQ Options */
  .options-grid { display: grid; gap: 10px; }

  .option-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .option-item:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(124,58,237,0.08);
    transform: translateX(4px);
  }
  .option-letter {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.2s;
    color: var(--text);
  }
  .option-item.selected-correct {
    background: rgba(16,185,129,0.12);
    border-color: var(--correct);
    animation: pulse-correct 0.4s ease;
  }
  .option-item.selected-correct .option-letter {
    background: var(--correct);
    color: white;
  }
  .option-item.selected-wrong {
    background: rgba(239,68,68,0.12);
    border-color: var(--wrong);
    animation: shake 0.4s ease;
  }
  .option-item.selected-wrong .option-letter {
    background: var(--wrong);
    color: white;
  }
  .option-item.show-correct {
    background: rgba(16,185,129,0.06);
    border-color: rgba(16,185,129,0.4);
    color: var(--correct);
  }
  .option-item.show-correct .option-letter {
    background: rgba(16,185,129,0.3);
    color: var(--correct);
  }
  .option-item.disabled { cursor: default; }

  /* Fill-in-blank */
  .fill-input-wrap { position: relative; }
  .fill-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    outline: none;
    transition: all 0.2s;
  }
  .fill-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(6,182,212,0.1); }
  .fill-input.correct-input { border-color: var(--correct); background: rgba(16,185,129,0.08); }
  .fill-input.wrong-input { border-color: var(--wrong); background: rgba(239,68,68,0.08); }
  .fill-submit {
    margin-top: 12px;
    background: var(--accent);
    border: none;
    color: white;
    padding: 12px 28px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .fill-submit:hover { background: #6d28d9; }
  .fill-answer-reveal {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--correct);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    display: none;
  }

  /* True/False */
  .tf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tf-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    cursor: pointer;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--text);
    transition: all 0.2s;
  }
  .tf-btn:hover:not(.disabled) { transform: translateY(-2px); }
  .tf-btn.true-btn:hover:not(.disabled) { border-color: var(--correct); background: rgba(16,185,129,0.08); }
  .tf-btn.false-btn:hover:not(.disabled) { border-color: var(--wrong); background: rgba(239,68,68,0.08); }
  .tf-btn .tf-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
  .tf-btn.selected-correct.true-btn { background: rgba(16,185,129,0.15); border-color: var(--correct); color: var(--correct); }
  .tf-btn.selected-correct.false-btn { background: rgba(16,185,129,0.15); border-color: var(--correct); color: var(--correct); }
  .tf-btn.selected-wrong { background: rgba(239,68,68,0.15); border-color: var(--wrong); color: var(--wrong); }
  .tf-btn.show-correct { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.4); color: var(--correct); }

  /* Feedback bar */
  .feedback-bar {
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.9rem;
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    animation: fadeIn 0.3s ease;
  }
  .feedback-bar.show { display: flex; }
  .feedback-bar.correct { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: var(--correct); }
  .feedback-bar.wrong { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: var(--wrong); }

  /* Translation Button & Box (UPDATED) */
  .translate-btn {
    background: transparent;
    border: 1px solid rgba(6,182,212,0.3);
    color: var(--accent2);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    transition: all 0.2s;
    margin-top: 20px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .translate-btn:hover { background: rgba(6,182,212,0.1); }
  
  .translate-box-auto {
    margin-top: 10px;
    padding: 16px;
    background: rgba(6,182,212,0.06);
    border-right: 4px solid var(--accent2);
    border-radius: 12px;
    color: var(--text);
    font-size: 0.95rem;
    line-height: 1.6;
    direction: rtl;
    text-align: right;
    animation: fadeIn 0.3s ease;
  }

  /* Navigation */
  .nav-area {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    width: 100%;
    margin-top: 8px;
  }

  .nav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(124,58,237,0.1); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.next-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    padding: 12px 32px;
  }
  .nav-btn.next-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,58,237,0.3); }
  .nav-btn.finish-btn {
    background: linear-gradient(135deg, var(--gold), #f97316);
    border: none;
    color: #1a1a1a;
    font-weight: 800;
  }

  .jump-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    width: 80px;
    text-align: center;
    outline: none;
  }
  .jump-input:focus { border-color: var(--accent); }

  /* ====== MISTAKES PANEL ====== */
  .mistakes-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--wrong);
    border: none;
    color: white;
    width: 56px; height: 56px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.4rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(239,68,68,0.4);
    z-index: 100;
    transition: all 0.2s;
  }
  .mistakes-toggle:hover { transform: scale(1.1); }
  .mistakes-count-badge {
    position: absolute;
    top: -4px; right: -4px;
    background: white;
    color: var(--wrong);
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 0.65rem;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    display: flex; align-items: center; justify-content: center;
  }

  .mistakes-panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 380px;
    background: var(--card);
    border-left: 1px solid var(--border);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .mistakes-panel.open { transform: translateX(0); }

  .mistakes-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .mistakes-header h2 {
    font-size: 1rem;
    font-weight: 800;
    color: var(--wrong);
  }
  .close-panel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .close-panel:hover { border-color: var(--wrong); color: var(--wrong); }

  .mistakes-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .mistakes-list::-webkit-scrollbar { width: 4px; }
  .mistakes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .mistake-item {
    background: var(--surface);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mistake-item:hover { border-color: var(--wrong); background: rgba(239,68,68,0.06); }
  .mistake-q { font-size: 0.85rem; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  .mistake-meta {
    display: flex;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
  }
  .m-yours { color: var(--wrong); }
  .m-correct { color: var(--correct); }

  /* ====== RESULTS SCREEN ====== */
  #results-screen { justify-content: center; gap: 32px; max-width: 700px; margin: 0 auto; width: 100%; }

  .results-hero {
    text-align: center;
    animation: fadeDown 0.6s ease;
  }
  .score-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0%, var(--accent2) var(--pct), var(--border) var(--pct));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }
  .score-ring::before {
    content: '';
    position: absolute;
    inset: 12px;
    background: var(--bg);
    border-radius: 50%;
  }
  .score-num {
    position: relative;
    z-index: 1;
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
  }
  .results-title {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    animation: fadeUp 0.6s ease 0.2s both;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
  }
  .stat-num { font-size: 2rem; font-weight: 800; font-family: 'Space Mono', monospace; }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  .results-actions {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.6s ease 0.4s both;
    flex-wrap: wrap;
    justify-content: center;
  }
  .res-btn {
    padding: 14px 28px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .res-btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
  }
  .res-btn.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .res-btn:hover { transform: translateY(-2px); }

  /* byline */
  .byline {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 800;
    color: var(--muted);
    text-align: center;
    position: fixed;
    bottom: 12px;
    left: 50%;

// ==================== STATE ====================
let state = {
  questions: [],
  currentIdx: 0,
  answers: {},    
  isCorrect: {},  
  mistakes: [],   
  correctCount: 0,
  wrongCount: 0,
  selectedType: 'mcq',
  order: 'sequential',
  mode: 'all', 
  showTranslation: false // New state for translation toggle
};

// ==================== STARTUP / THEME ====================
window.onload = () => {
  let saved = JSON.parse(localStorage.getItem('ygy_quiz_mistakes')) || [];
  document.getElementById('saved-mistakes-badge').textContent = saved.length;
  updateAvailableCount();
  if (localStorage.getItem('ygy_theme') === 'light') toggleTheme(true);
};

function toggleTheme(forceLight = false) {
  if (forceLight === true || !document.body.classList.contains('light-mode')) {
    document.body.classList.add('light-mode');
    localStorage.setItem('ygy_theme', 'light');
  } else {
    document.body.classList.remove('light-mode');
    localStorage.setItem('ygy_theme', 'dark');
  }
}

// ==================== SETUP ====================
function toggleType(type) {
  state.selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.type === type);
  });
  updateAvailableCount();
}
function toggleOrder(order) {
  state.order = order;
  document.querySelectorAll('[data-order]').forEach(b => {
    b.classList.toggle('selected', b.dataset.order === order);
  });
}
function setMode(m) {
  state.mode = m;
  document.getElementById('mode-all').classList.toggle('selected', m === 'all');
  document.getElementById('mode-mistakes').classList.toggle('selected', m === 'mistakes');
  updateAvailableCount();
}

function updateAvailableCount() {
  let pool = [];
  if (state.mode === 'mistakes') {
    pool = JSON.parse(localStorage.getItem('ygy_quiz_mistakes')) || [];
  } else {
    const t = state.selectedType;
    if (t === 'mcq' || t === 'mix') pool.push(...MCQ_QUESTIONS);
    if (t === 'fill' || t === 'mix') pool.push(...FILL_QUESTIONS);
    if (t === 'tf' || t === 'mix') pool.push(...TF_QUESTIONS);
  }
  document.getElementById('total-avail-badge').textContent = pool.length;
  document.getElementById('q-limit-input').value = pool.length; // auto update limit to max
}

function clearMistakes(e) {
  e.preventDefault();
  if(confirm("Are you sure you want to clear your saved mistakes?")) {
    localStorage.removeItem('ygy_quiz_mistakes');
    document.getElementById('saved-mistakes-badge').textContent = '0';
    updateAvailableCount();
  }
}

function buildQuestions() {
  let pool = [];
  
  if (state.mode === 'mistakes') {
    pool = JSON.parse(localStorage.getItem('ygy_quiz_mistakes')) || [];
  } else {
    const t = state.selectedType;
    if (t === 'mcq' || t === 'mix') pool.push(...MCQ_QUESTIONS.map((q,i)=>({...q, type:'mcq', origIdx:i})));
    if (t === 'fill' || t === 'mix') pool.push(...FILL_QUESTIONS.map((q,i)=>({...q, type:'fill', origIdx:i})));
    if (t === 'tf' || t === 'mix') pool.push(...TF_QUESTIONS.map((q,i)=>({...q, type:'tf', origIdx:i})));
  }

  if (state.order === 'random') pool = pool.sort(() => Math.random() - 0.5);
  
  // Apply Limit
  let limit = parseInt(document.getElementById('q-limit-input').value);
  if(limit && limit > 0 && limit < pool.length) {
    pool = pool.slice(0, limit);
  }
  
  return pool;
}

function startQuiz() {
  state.questions = buildQuestions();
  if(state.questions.length === 0) {
    alert("لا توجد أسئلة متاحة في هذا الوضع!");
    return;
  }
  state.currentIdx = 0;
  state.answers = {};
  state.isCorrect = {};
  state.mistakes = [];
  state.correctCount = 0;
  state.wrongCount = 0;
  state.showTranslation = false; // Reset translation
  
  showScreen('quiz-screen');
  document.getElementById('mistakes-toggle').style.display = 'flex';
  renderQuestion();
}

function goToSetup() {
  let saved = JSON.parse(localStorage.getItem('ygy_quiz_mistakes')) || [];
  document.getElementById('saved-mistakes-badge').textContent = saved.length;
  updateAvailableCount();
  
  showScreen('setup-screen');
  document.getElementById('mistakes-toggle').style.display = 'none';
  if (document.getElementById('mistakes-panel').classList.contains('open')) {
    toggleMistakesPanel();
  }
}

// ==================== RENDER ====================
function renderQuestion() {
  const q = state.questions[state.currentIdx];
  const total = state.questions.length;
  const idx = state.currentIdx;
  const answered = state.answers.hasOwnProperty(idx);

  // Header
  document.getElementById('progress-fill').style.width = ((idx+1)/total*100) + '%';
  document.getElementById('q-counter').textContent = (idx+1) + ' / ' + total;
  document.getElementById('correct-badge').textContent = '✓ ' + state.correctCount;
  document.getElementById('wrong-badge').textContent = '✗ ' + state.wrongCount;

  // Build card
  let tagHTML = '';
  if (q.type === 'mcq') tagHTML = '<span class="q-type-tag tag-mcq">Multiple Choice</span>';
  else if (q.type === 'fill') tagHTML = '<span class="q-type-tag tag-fill">Fill in Blank</span>';
  else tagHTML = '<span class="q-type-tag tag-tf">True / False</span>';

  let contentHTML = '';
  if (q.type === 'mcq') contentHTML = renderMCQ(q, idx, answered);
  else if (q.type === 'fill') contentHTML = renderFill(q, idx, answered);
  else contentHTML = renderTF(q, idx, answered);

  // Translation Toggle Button
  let transText = getTranslation(q);
  let transBtnText = state.showTranslation ? 'إخفاء الترجمة 🌐' : 'أظهر الترجمة 🌐';
  let transDisplay = state.showTranslation ? 'block' : 'none';

  let transHTML = `
    <button class="translate-btn" onclick="toggleTranslation()">
      ${transBtnText}
    </button>
    <div class="translate-box-auto" style="display: ${transDisplay};">
      <div style="font-weight:600;">${transText}</div>
    </div>
  `;

  document.getElementById('question-card').innerHTML = `
    ${tagHTML}
    <div class="q-text">${(idx+1)}. ${q.q}</div>
    ${contentHTML}
    ${transHTML}
  `;

  // Nav buttons
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').textContent = idx === total-1 ? 'Last →' : 'Next →';
  document.getElementById('jump-input').value = '';
}

function renderMCQ(q, idx, answered) {
  const userAns = state.answers[idx];
  let optionsHTML = q.opts.map((opt, i) => {
    let cls = '';
    const letter = ['A','B','C','D'][i];
    if (answered) {
      if (i === q.ans) cls = 'show-correct';
      if (i === userAns && userAns === q.ans) cls = 'selected-correct';
      else if (i === userAns && userAns !== q.ans) cls = 'selected-wrong';
    }
    return `<div class="option-item ${cls} ${answered?'disabled':''}" onclick="${answered?'':'selectMCQ('+idx+','+i+')'}" >
      <span class="option-letter">${letter}</span>
      <span>${opt}</span>
    </div>`;
  }).join('');

  let feedbackHTML = '';
  if (answered) {
    const ok = state.isCorrect[idx];
    feedbackHTML = `<div class="feedback-bar show ${ok?'correct':'wrong'}">
      ${ok ? '✓ Correct!' : `✗ Wrong! Correct answer: <b>${q.opts[q.ans]}</b>`}
    </div>`;
  }

  return `<div class="options-grid">${optionsHTML}</div>${feedbackHTML}`;
}

function renderFill(q, idx, answered) {
  const userAns = state.answers[idx] || '';
  const ok = state.isCorrect[idx];
  let cls = answered ? (ok ? 'correct-input' : 'wrong-input') : '';
  let revealHTML = answered && !ok ? `<div class="fill-answer-reveal" style="display:block">✓ Correct answer: <b>${q.ans}</b></div>` : '';
  let feedback = answered ? `<div class="feedback-bar show ${ok?'correct':'wrong'}">${ok?'✓ Correct!':'✗ Wrong!'}</div>` : '';
  return `
    <div class="fill-input-wrap">
      <input type="text" class="fill-input ${cls}" id="fill-input-${idx}" value="${userAns}" placeholder="Type your answer..." ${answered?'readonly':''} onkeydown="if(event.key==='Enter')submitFill(${idx})">
      ${!answered ? `<button class="fill-submit" onclick="submitFill(${idx})">Submit ↵</button>` : ''}
      ${revealHTML}
    </div>
    ${feedback}
  `;
}

function renderTF(q, idx, answered) {
  const userAns = state.answers[idx];
  const ok = state.isCorrect[idx];

  function tfCls(val) {
    if (!answered) return '';
    const isCorrectAnswer = (val === q.ans);
    const isUserAnswer = (val === userAns);
    if (isUserAnswer && ok) return 'selected-correct';
    if (isUserAnswer && !ok) return 'selected-wrong';
    if (isCorrectAnswer && !ok) return 'show-correct';
    return '';
  }

  let feedback = answered ? `<div class="feedback-bar show ${ok?'correct':'wrong'}">${ok?'✓ Correct!':'✗ Wrong! Correct: <b>'+(q.ans?'TRUE':'FALSE')+'</b>'}</div>` : '';

  return `
    <div class="tf-grid">
      <button class="tf-btn true-btn ${tfCls(true)} ${answered?'disabled':''}" onclick="${answered?'':'selectTF('+idx+',true)'}">
        <span class="tf-icon">✅</span> TRUE
      </button>
      <button class="tf-btn false-btn ${tfCls(false)} ${answered?'disabled':''}" onclick="${answered?'':'selectTF('+idx+',false)'}">
        <span class="tf-icon">❌</span> FALSE
      </button>
    </div>
    ${feedback}
  `;
}

function getTranslation(q) {
  if (q.type === 'mcq' && q.origIdx !== undefined) {
    const t = TRANSLATIONS.mcq[q.origIdx];
    return t || "لا توجد ترجمة دقيقة لهذا السؤال حالياً.";
  }
  return "الترجمة متوفرة لأسئلة الاختيارات المتعددة فقط.";
}

function toggleTranslation() {
  state.showTranslation = !state.showTranslation;
  renderQuestion();
}

// ==================== ANSWER HANDLERS ====================
function selectMCQ(idx, choice) {
  if (state.answers.hasOwnProperty(idx)) return;
  state.answers[idx] = choice;
  const q = state.questions[idx];
  const correct = choice === q.ans;
  state.isCorrect[idx] = correct;
  if (correct) state.correctCount++;
  else {
    state.wrongCount++;
    addMistake(idx, ['A','B','C','D'][choice], q.opts[q.ans]);
  }
  updateBadges();
  renderQuestion();
}

function submitFill(idx) {
  const input = document.getElementById('fill-input-' + idx);
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  state.answers[idx] = val;
  const q = state.questions[idx];
  const correct = val.toLowerCase().replace(/[^a-z0-9]/g,'') === q.ans.toLowerCase().replace(/[^a-z0-9]/g,'');
  state.isCorrect[idx] = correct;
  if (correct) state.correctCount++;
  else {
    state.wrongCount++;
    addMistake(idx, val, q.ans);
  }
  updateBadges();
  renderQuestion();
}

function selectTF(idx, choice) {
  if (state.answers.hasOwnProperty(idx)) return;
  state.answers[idx] = choice;
  const q = state.questions[idx];
  const correct = choice === q.ans;
  state.isCorrect[idx] = correct;
  if (correct) state.correctCount++;
  else {
    state.wrongCount++;
    addMistake(idx, choice ? 'TRUE' : 'FALSE', q.ans ? 'TRUE' : 'FALSE');
  }
  updateBadges();
  renderQuestion();
}

function updateBadges() {
  document.getElementById('correct-badge').textContent = '✓ ' + state.correctCount;
  document.getElementById('wrong-badge').textContent = '✗ ' + state.wrongCount;
  document.getElementById('mistakes-count-badge').textContent = state.mistakes.length;
}

// ==================== NAVIGATION ====================
function navigate(dir) {
  const next = state.currentIdx + dir;
  if (next < 0 || next >= state.questions.length) return;
  state.currentIdx = next;
  state.showTranslation = false; // Reset translation on next q
  renderQuestion();
  window.scrollTo(0,0);
}

function jumpTo(val) {
  const n = parseInt(val) - 1;
  if (isNaN(n) || n < 0 || n >= state.questions.length) return;
  state.currentIdx = n;
  state.showTranslation = false; // Reset translation
  renderQuestion();
  window.scrollTo(0,0);
}

// ==================== MISTAKES ====================
function addMistake(idx, yours, correct) {
  const q = state.questions[idx];
  
  state.mistakes.push({ idx, q: q.q, yours, correct });
  renderMistakesList();

  let saved = JSON.parse(localStorage.getItem('ygy_quiz_mistakes')) || [];
  let exists = saved.find(item => item.q === q.q);
  if (!exists) {
    saved.push(q);
    localStorage.setItem('ygy_quiz_mistakes', JSON.stringify(saved));
  }
}

function renderMistakesList() {
  const list = document.getElementById('mistakes-list');
  if (state.mistakes.length === 0) {
    list.innerHTML = `<div class="empty-mistakes"><span class="em-icon">🎉</span>No mistakes yet!<br>Keep it up!</div>`;
    return;
  }
  list.innerHTML = state.mistakes.map((m, i) => `
    <div class="mistake-item" onclick="jumpToMistake(${m.idx})">
      <div class="mistake-q">${i+1}. ${m.q.substring(0,80)}${m.q.length>80?'...':''}</div>
      <div class="mistake-meta">
        <span class="m-yours">Your: ${m.yours}</span>
        <span>•</span>
        <span class="m-correct">✓ ${m.correct}</span>
      </div>
    </div>
  `).join('');
}

function jumpToMistake(idx) {
  state.currentIdx = idx;
  state.showTranslation = false;
  renderQuestion();
  toggleMistakesPanel();
  window.scrollTo(0,0);
}

function toggleMistakesPanel() {
  const panel = document.getElementById('mistakes-panel');
  panel.classList.toggle('open');
  renderMistakesList();
}

// ==================== RESULTS ====================
function showResults() {
  const total = state.questions.length;
  const answered = Object.keys(state.answers).length;
  const correct = state.correctCount;
  const wrong = state.wrongCount;
  const skipped = total - answered;
  const pct = Math.round(correct / total * 100);

  document.getElementById('score-percent').textContent = pct + '%';
  document.getElementById('score-ring').style.setProperty('--pct', pct + '%');
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skipped;

  const titles = [
    [90, '🏆 Outstanding!'],
    [75, '⭐ Great Work!'],
    [60, '👍 Not Bad!'],
    [0, '💪 Keep Studying!'],
  ];
  const title = titles.find(([min]) => pct >= min)[1];
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-sub').textContent = `You answered ${answered} of ${total} questions. Score: ${correct}/${total}`;

  showScreen('results-screen');
}

function reviewMistakes() {
  showScreen('quiz-screen');
  if (state.mistakes.length > 0) toggleMistakesPanel();
}

// ==================== SCREEN ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
